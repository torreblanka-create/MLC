# ─────────────────────────────────────────────────────────────────────────────
# Cloud Build — Plataforma de Inducción GMLC
#
# COSTOS (tier gratuito):
#   Frontend → Firebase Hosting: GRATIS (Spark plan, sin tarjeta requerida)
#   Backend  → Cloud Run con min-instances=0: GRATIS cuando no hay tráfico
#              Free tier: 2M requests/mes + 360K GB-s compute/mes
#   Cloud Build: 120 min/día gratis
#   Container Registry: primer GB gratis (imagen PHP ~80 MB)
#
# REQUISITOS PREVIOS (una sola vez):
#   gcloud auth login
#   gcloud projects create induccion-gmlc --name="Induccion GMLC"
#   firebase login && firebase use induccion-gmlc
#   gcloud services enable run.googleapis.com cloudbuild.googleapis.com
#   gcloud iam service-accounts create cloud-build-sa \
#     --project=induccion-gmlc
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: us-central1
  _API_SERVICE: induccion-api

steps:

  # ── 1. Build React frontend ──────────────────────────────────────────────
  - id: 'npm-build'
    name: 'node:20-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'npm ci --prefer-offline && npm run build'
    env:
      - 'NODE_ENV=production'

  # ── 2. Deploy frontend a Firebase Hosting (GRATIS) ───────────────────────
  - id: 'firebase-deploy'
    name: 'gcr.io/firebase-hosting/node:latest'
    args:
      - 'firebase'
      - 'deploy'
      - '--only'
      - 'hosting'
      - '--project=$PROJECT_ID'
    waitFor: ['npm-build']

  # ── 3. Build imagen Docker del backend PHP ───────────────────────────────
  - id: 'docker-build-api'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from=gcr.io/$PROJECT_ID/${_API_SERVICE}:latest'
      - '-t=gcr.io/$PROJECT_ID/${_API_SERVICE}:$COMMIT_SHA'
      - '-t=gcr.io/$PROJECT_ID/${_API_SERVICE}:latest'
      - './server'
    waitFor: ['-']   # corre en paralelo con npm-build

  # ── 4. Push imagen del backend ───────────────────────────────────────────
  - id: 'docker-push-api'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/${_API_SERVICE}']
    waitFor: ['docker-build-api']

  # ── 5. Deploy backend a Cloud Run con scale-to-zero (GRATIS en reposo) ──
  - id: 'cloudrun-deploy-api'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_API_SERVICE}'
      - '--image=gcr.io/$PROJECT_ID/${_API_SERVICE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--min-instances=0'          # ← scale-to-zero: no cobra cuando está inactivo
      - '--max-instances=3'          # ← límite para no sorpresas de facturación
      - '--memory=256Mi'
      - '--cpu=1'
      - '--cpu-throttling'           # ← CPU solo durante requests (más barato)
      - '--timeout=30'
      - '--concurrency=80'
    waitFor: ['docker-push-api']

images:
  - 'gcr.io/$PROJECT_ID/${_API_SERVICE}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_API_SERVICE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'   # build más rápido = menos minutos gastados
